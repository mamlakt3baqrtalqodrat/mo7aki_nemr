<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>محاكي اختبار نمر</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { 
            --primary-color: #00a5a5; 
            --bg-sidebar: #f0f4f8; 
            --white: #ffffff; 
            --text-dark: #333;
            --correct-green: #2ecc71;
        }
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* إزالة الوميض الأزرق عند اللمس في الآيفون */
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f7f9fb; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            color: var(--text-dark);
            overflow: hidden;
            /* دعم منطقة الأمان في الآيفون */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background-image: url('https://i.ibb.co/qYjkGjbD/6cc50c2f-b3ae-4567-9938-c6babc3abd37.jpg');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 280px; /* تصغير حجم الخلفية ليناسب الجوال */
            opacity: 0.06;
            z-index: -1;
            pointer-events: none;
        }

        #name-screen { 
            position: fixed; 
            inset: 0; 
            background: linear-gradient(to bottom, var(--primary-color) 0%, #ffffff 100%); 
            z-index: 9999; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            flex-direction: column; 
            padding: 20px;
        }
        
        #name-input { 
            padding: 15px; 
            width: 100%; 
            max-width: 320px; 
            font-size: 18px; 
            border: 2px solid var(--primary-color); 
            border-radius: 10px; 
            margin-bottom: 20px; 
            text-align: center;
            outline: none;
        }

        header { 
            background-color: var(--primary-color); 
            color: white; 
            padding: 15px 20px; 
            display: none; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 10; 
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .main-container { 
            display: none; 
            flex: 1; 
            overflow: hidden; 
            flex-direction: row;
        }
        
        .sidebar { 
            width: 280px; 
            background-color: var(--bg-sidebar); 
            border-left: 1px solid #d1d9e0; 
            padding: 20px 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            overflow-y: auto; 
        }
        
        .timer-section { 
            background: var(--white); 
            border: 2px solid var(--primary-color); 
            border-radius: 10px; 
            padding: 12px; 
            text-align: center; 
        }

        .timer-value { 
            font-size: 26px; 
            font-weight: bold; 
            color: #e74c3c; 
            font-family: monospace; 
        }

        .questions-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 6px; 
        }

        .q-num { 
            height: 40px; /* زيادة الطول ليناسب اللمس */
            background: white; 
            border: 1px solid #ccd6dd; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 8px;
            font-size: 13px;
        }

        .q-num.active { 
            border: 2px solid #f39c12; 
            background: #fffdf0; 
            color: #f39c12; 
        }

        .q-num.answered { 
            background-color: var(--correct-green); 
            color: white; 
            border: none; 
        }
        
        .content { 
            flex: 1; 
            padding: 15px; 
            background: rgba(255, 255, 255, 0.9); 
            overflow-y: auto; 
        }

        .question-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 800px;
            margin: 0 auto;
        }

        .option { 
            padding: 14px 18px; /* زيادة المساحة الداخلية للضغط المريح */
            border: 1px solid #dee2e6; 
            border-radius: 10px; 
            cursor: pointer; 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            font-size: 15px;
            transition: background 0.2s;
        }

        .option.selected { 
            border: 2px solid var(--primary-color); 
            background-color: #f0fafa; 
            font-weight: bold;
        }

        .btn { 
            padding: 14px 25px; 
            border-radius: 10px; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 15px;
            flex: 1;
            margin: 0 5px;
            text-align: center;
        }

        .btn-save { 
            background-color: var(--primary-color); 
            color: white; 
        }

        footer { 
            background-color: var(--primary-color); 
            color: white; 
            text-align: center; 
            padding: 12px; 
            display: none; 
            font-size: 14px;
        }

        /* تعديلات خاصة بالشاشات الصغيرة (الأندرويد والآيفون) */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column; /* تحويل الترتيب عمودياً */
            }

            .sidebar {
                width: 100%;
                order: -1; /* جعل العداد والشبكة في الأعلى */
                padding: 10px;
                border-left: none;
                border-bottom: 1px solid #d1d9e0;
                gap: 10px;
            }

            .timer-section {
                padding: 8px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .timer-title {
                font-weight: bold;
            }

            .timer-value {
                font-size: 22px;
            }

            .questions-grid {
                grid-template-columns: repeat(10, 1fr); /* عرض 10 أرقام في الصف الواحد بالجوال */
                gap: 4px;
            }

            .q-num {
                height: 32px;
                font-size: 11px;
                border-radius: 5px;
            }

            .content {
                padding: 10px;
            }

            .question-card {
                padding: 15px;
                border-radius: 10px;
            }

            #q-text {
                font-size: 16px !important;
            }

            .option {
                font-size: 14px;
                padding: 12px 15px;
            }
            
            header {
                padding: 12px 15px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

<div id="name-screen">
    <img src="https://i.ibb.co/qYjkGjbD/6cc50c2f-b3ae-4567-9938-c6babc3abd37.jpg" alt="Logo" style="width: 110px; margin-bottom: 20px; border-radius: 15px;">
    <h2 style="margin-bottom: 20px; color:#333;">محاكي اختبار نمر</h2>
    <input type="text" id="name-input" placeholder="اكتب اسمك الثلاثي...">
    <button class="btn btn-save" style="width: 100%; max-width: 320px; margin: 0;" onclick="startQuiz()">ابدأ الاختبار</button>
</div>

<header id="main-header">
    <div id="top-answered">المجابة: 0 / 30</div>
    <div style="font-weight: bold;">محاكي اختبار نمر</div>
    <div id="user-display"></div>
</header>

<div class="main-container" id="app-body">
    <div class="sidebar" id="sidebar">
        <div class="timer-section">
            <span class="timer-title" style="display: none; color: #555;">الوقت المتبقي:</span>
            <div class="timer-value" id="timer-box">30:00</div>
        </div>
        <div class="questions-grid" id="q-grid"></div>
    </div>

    <div class="content" id="main-content">
        <div class="question-card">
            <div id="section-title" style="color: var(--primary-color); font-weight: bold; margin-bottom: 8px; font-size: 14px;"></div>
            <div id="q-text" style="font-weight: bold; margin-bottom: 20px; font-size: 18px; line-height: 1.5;"></div>
            <div id="options-container"></div>
            <div style="display: flex; justify-content: space-between; margin-top: 25px;">
                <button class="btn" style="background: #eee; color: #333;" onclick="prevQuestion()">السابق</button>
                <button class="btn btn-save" onclick="nextQuestion()">حفظ والتالي</button>
            </div>
        </div>
    </div>
</div>

<footer id="main-footer">صل على النبي ﷺ</footer>

<script>
    const SERVICE_ID = "service_alszjvq"; 
    const TEMPLATE_ID = "template_h6f7c0s"; 
    const PUBLIC_KEY = "SVD10ASuh3Lyln1HJ"; 
    
    emailjs.init(PUBLIC_KEY);

    const _0x_aK = [2, 0, 0, 0, 3, 0, 2, 2, 2, 1, 1, 2, 3, 1, 0, 0, 3, 3, 2, 1, 1, 3, 0, 3, 2, 0, 0, 3, 2, 3];
    
    const questions = [
        { q: "إذا كان: 3س³ - 23 - 2س = 3س³ - 29 + 2س² ، أي مما يلي أحد جذري المعادلة؟", options: ["6", "5", "3", "1"] },
        { q: "(5^7 + 5^8) / 5^7 = ........", options: ["6", "7", "8", "9"] },
        { q: "4 ⬜ 2 = 6 ⬜ 2 ، ما هي العمليات الحسابية المناسبة على التوالي لكي تصبح العلاقة صحيحة؟", options: ["× ، ×", "÷ ، +", "+ ، -", "- ، +"] },
        { q: "إذا كان: س > ص > 1 ، قارن بين: القيمة الأولى (س - 1) / ص ، القيمة الثانية (س - 1) / س", options: ["القيمة الأولى أكبر", "القيمة الثانية أكبر", "القيمتان متساويتان", "المعطيات غير كافية"] },
        { q: "إذا كان س + (1/س) = 3 + (1/3) ، قارن بين: القيمة الأولى (س) ، القيمة الثانية (2)", options: ["القيمة الأولى أكبر", "القيمة الثانية أكبر", "القيمتان متساويتان", "المعطيات غير كافية"] },
        { q: "إذا كان 5 ، 2 ، 7 من عوامل العدد س ، أي مما يلي يقبل القسمة على 70؟", options: ["س²", "س² + 100", "س² + 1000", "س + 100"] },
        { q: "اختبار مدته 90 دقيقة به عدد من الأقسام وبين كل قسمين 5 دقائق راحة، فإذا بدأ الاختبار الساعة 8:00 وانتهى الساعة 9:55 ، كم عدد أقسام الاختبار؟", options: ["7", "6", "5", "4"] },
        { q: "أعطى أحمد لأخته ربع ما معه ثم صرف نصف ما تبقى معه وتبقى معه 3 ريال، كم كان معه؟", options: ["12", "9", "8", "6"] },
        { q: "في جامعة عدد الطالبات ضعف عدد الطلاب، تم تكريم 1/8 الطالبات، و 1/9 الطلاب، ما نسبة الذين لم يكرموا؟", options: ["35/72", "32/36", "23/36", "1/24"] },
        { q: "10 أشخاص في طابور، خالد ترتيبه الخامس من اليمين وأحمد ترتيبه الثامن من اليسار، كم شخص يقف بين أحمد وخالد؟", options: ["1", "2", "4", "8"] },
        { q: "إذا كان طول أحمد مثلي طول خالد، طول خالد 70٪ من طول سعد، طول هادي 120٪ من طول أحمد، ما أقصر شخص فيهم؟", options: ["أحمد", "خالد", "سعد", "هادي"] },
        { q: "محل للقماش يبيع القطعة بـ 500 ريال وكل 3 قطع بخصم 10٪، كم تدفع عند شراء 5 قطع？", options: ["2200", "2250", "2350", "2375"] },
        { q: "3 مدن رسمت على خريطة كرؤوس مثلث متطابق الأضلاع محيطه = 9 سم، إذا كان مقياس الرسم = 1 سم : 50 كلم، ما المسافة بين كل مدينة وأخرى؟", options: ["450 كلم", "300 كلم", "200 كلم", "150 كلم"] },
        { q: "قطعة أرض مستطيلة الشكل طولها 150 م وعرضها 100 م، و1 كيلوجرام من بذور القمح تغطي 15 م² من الأرض، وسعر الكيلوجرام من البذور 5 ريال، كم التكلفة لتغطية الأرض كاملة؟", options: ["2500", "5000", "7500", "10000"] },
        { q: "80 بلاطة مربعة متطابقة، محيط البلاطة = 1 متر. ما مساحة البلاط الكلي بالمتر المربع؟", options: ["5", "10", "25", "50"] },
        { q: "التناظر اللفظي - استنشاق : نظافة", options: ["مصافحة : سلام", "صلاة : ركوع", "تدبير : اقتصاد", "رحمة : عطف"] },
        { q: "التناظر اللفظي - أسبرين : صداع", options: ["فيتامين : فواكه", "تدبير : اقتصاد", "مصافحة : سلام", "توكل : تردد"] },
        { q: "التناظر اللفظي - بر : نزهة", options: ["مدينة : سفر", "حديقة : أزهار", "مصنع : صناعة", "مكتبة : قراءة"] },
        { q: "إكمال الجمل - عامل ربك بخشوع، وعامل أعداءك ........ وعامل عباده بـ ........", options: ["بالقوة - بالضعف", "بالسياسة - بالإحسان", "بالعدل - بالتواضع", "بالحذر - بالرفق"] },
        { q: "إكمال الجمل - الكلمات الرقيقة لا تشبع ........ الجائعة، بل تحتاج إلى الطعام، والمريض يحتاج إلى ........ فأعطِ كل محتاج ما يحتاج.", options: ["البطون - سريراً", "المعدة - الدواء", "الأفئدة - الطبيب", "النفوس - الراحة"] },
        { q: "إكمال الجمل - لا أرجو ........ الحمل ولكن أرجو ........ الظهر.", options: ["شرر - استقامة", "خفة - قوة", "ثقل - عضلات", "سهولة - فقرات"] },
        { q: "الخطأ السياقي - هناك شيئان ليس لهما ثبات أو اختفاء؛ ظل الغمام والنبأ الكاذب.", options: ["الغمام", "الكاذب", "ثبات", "اختفاء"] },
        { q: "الخطأ السياقي - ارقد خلال الأرض وانظر إلى آثار ما صنع المليك.", options: ["ارقد", "انظر", "آثار", "صنع"] },
        { q: "الخطأ السياقي - للعلم الذي هو ذكاء العقول وصقالها مكانة مشتبهة عند أهل الفضل والألباب.", options: ["ذكاء", "العقول", "مكانة", "مشتبهة"] },
        { q: "استيعاب المقروء - ما الدليل على أن الاحتطاب من وسائل الترفيه؟", options: ["بسبب زيادة السكان وارتفاع مستوى المعيشة", "عدم استعماله في التدفئة", "وجود بدائل كثيرة للطاقة توفرها الدولة", "لأن المملكة من الدول المنتجة للطاقة"] },
        { q: "استيعاب المقروء - بما أن السعودية من الدول المنتجة للطاقة؛ فهذا يدعونا إلى:", options: ["ترشيد استهلاك الحطب", "منع قطع الأشجار مطلقاً", "التشجيع على استخدام المورد المحلي", "زيادة الرفاهية"] },
        { q: "استيعاب المقروء - الفقرة (2) تحدثت عن ..........", options: ["وضع قوانين للحد من قطع الأشجار", "أهمية وزارة الزراعة", "استيراد الأشجار", "الاحتطاب العشوائي وأسبابه"] },
        { q: "المفردة الشاذة - حدد الكلمة المختلفة:", options: ["كتابة", "قراءة", "مشاهدة", "مطالعة"] },
        { q: "المفردة الشاذة - حدد الكلمة المختلفة:", options: ["مقابلة", "مقاتلة", "مناولة", "محاولة"] },
        { q: "المفردة الشاذة - حدد الكلمة المختلفة:", options: ["شمس", "قمر", "نار", "مصباح"] }
    ];

    let currentIdx = 0; 
    let userAnswers = new Array(30).fill(null); 
    let userName = ""; 
    let timerInterval;

    // تفعيل ظهور كلمة "الوقت المتبقي" فقط في شاشات الجوال الممتدة عرضياً
    function checkDeviceWidth() {
        const title = document.querySelector('.timer-title');
        if(window.innerWidth <= 768) {
            title.style.display = 'inline-block';
        } else {
            title.style.display = 'none';
        }
    }
    window.addEventListener('resize', checkDeviceWidth);

    function startQuiz() {
        const input = document.getElementById('name-input');
        if (input.value.trim().length < 3) { 
            alert("أدخل اسمك الثلاثي"); 
            return; 
        }
        userName = input.value.trim();
        document.getElementById('name-screen').style.display = 'none'; 
        document.getElementById('main-header').style.display = 'flex'; 
        document.getElementById('app-body').style.display = 'flex'; 
        document.getElementById('main-footer').style.display = 'block';
        document.getElementById('user-display').innerText = userName;
        checkDeviceWidth();
        const endTime = Date.now() + (30 * 60 * 1000);
        renderQuestion(); 
        startTimer(endTime);
    }

    function startTimer(endTime) {
        timerInterval = setInterval(() => {
            const distance = endTime - Date.now();
            if (distance <= 0) { 
                clearInterval(timerInterval); 
                finishQuiz(); 
                return; 
            }
            let m = Math.floor(distance / 60000); 
            let s = Math.floor((distance % 60000) / 1000);
            
            let mStr = m < 10 ? '0' + m : m;
            let sStr = s < 10 ? '0' + s : s;
            document.getElementById('timer-box').innerText = `${mStr}:${sStr}`;
        }, 1000);
    }

    function renderQuestion() {
        const q = questions[currentIdx];
        document.getElementById('section-title').innerText = currentIdx < 15 ? "القسم الكمي" : "القسم اللفظي";
        document.getElementById('q-text').innerText = `س${currentIdx + 1}: ${q.q}`;
        const container = document.getElementById('options-container'); 
        container.innerHTML = ''; 
        const prefixes = ["أ", "ب", "ج", "د"];
        
        q.options.forEach((opt, i) => {
            const div = document.createElement('div'); 
            div.className = `option ${userAnswers[currentIdx] === i ? 'selected' : ''}`;
            div.innerHTML = `<span style="background:var(--primary-color); color:white; width:24px; height:24px; display:inline-flex; align-items:center; justify-content:center; border-radius:50%; margin-left:10px; font-size:12px; font-weight:bold;">${prefixes[i]}</span> ${opt}`;
            div.onclick = () => { 
                userAnswers[currentIdx] = i; 
                renderQuestion(); 
                updateStats(); 
            }; 
            container.appendChild(div);
        });
        updateGrid();
    }

    function updateGrid() {
        const grid = document.getElementById('q-grid'); 
        grid.innerHTML = '';
        questions.forEach((_, i) => {
            const d = document.createElement('div'); 
            d.className = `q-num ${(userAnswers[i] !== null) ? 'answered' : ''} ${i === currentIdx ? 'active' : ''}`; 
            d.innerText = i + 1;
            d.onclick = () => { 
                currentIdx = i; 
                renderQuestion(); 
            }; 
            grid.appendChild(d);
        });
    }

    function updateStats() { 
        const count = userAnswers.filter(a => a !== null).length; 
        document.getElementById('top-answered').innerText = `المجابة: ${count} / 30`; 
    }

    function nextQuestion() { 
        if (currentIdx < 29) { 
            currentIdx++; 
            renderQuestion(); 
        } else { 
            if(confirm("هل تريد تسليم الاختبار؟")) finishQuiz(); 
        } 
    }
    
    function prevQuestion() { 
        if (currentIdx > 0) { 
            currentIdx--; 
            renderQuestion(); 
        } 
    }

    function finishQuiz() {
        clearInterval(timerInterval); 
        let correctCount = 0; 
        let details = ""; 
        const prefixes = ["أ", "ب", "ج", "د"];
        
        questions.forEach((q, i) => { 
            const isCorrect = userAnswers[i] === _0x_aK[i]; 
            if (isCorrect) correctCount++; 
            details += `س${i+1}: (${prefixes[userAnswers[i]] || 'لم يحل'}) | ${isCorrect ? '✅' : '❌'}\n`; 
        });
        
        const scorePercent = Math.round((correctCount / 30) * 100);
        document.getElementById('sidebar').style.display = 'none';
        document.getElementById('main-content').innerHTML = `
            <div class='question-card' style='text-align:center; margin-top: 20px;'>
                <h2 style="color: var(--primary-color);">تم التسليم بنجاح!</h2> 
                <p style="font-size:16px;">الطالب: <strong>${userName}</strong></p>
                <div style='background:#f8f9fa; padding:20px; border-radius:12px; border: 1px solid #eee; max-width: 300px; margin: 0 auto;'>
                    <p style="margin:0 0 10px 0; color:#555;">درجتك: ${correctCount} من 30</p> 
                    <p style='font-size:2em; font-weight:bold; color:var(--primary-color); margin:0;'>%${scorePercent}</p>
                </div>
                <p id="mail-status" style="margin-top:20px; color:orange; font-weight:bold; font-size:14px;">جاري إرسال النتيجة للإدارة...</p>
            </div>`;
            
        emailjs.send(SERVICE_ID, TEMPLATE_ID, { 
            user_name: userName, 
            user_score: scorePercent + "%", 
            user_details: details  
        }).then(
            function() { 
                document.getElementById('mail-status').innerText = "تم إرسال النتيجة بنجاح ✅"; 
                document.getElementById('mail-status').style.color = "green"; 
            },
            function(error) { 
                alert("فشل الإرسال: " + JSON.stringify(error)); 
                document.getElementById('mail-status').innerText = "فشل إرسال النتيجة تلقائياً ❌"; 
                document.getElementById('mail-status').style.color = "red"; 
            }
        );
    }
