<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي اختبار نمر</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { 
            --primary-color: #00a5a5; 
            --bg-sidebar: #f0f4f8; 
            --white: #ffffff; 
            --text-dark: #333;
            --correct-green: #2ecc71;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f7f9fb; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            color: var(--text-dark);
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://i.ibb.co/qYjkGjbD/6cc50c2f-b3ae-4567-9938-c6babc3abd37.jpg');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 450px;
            opacity: 0.1;
            z-index: -1;
            pointer-events: none;
        }

        #name-screen { 
            position: fixed; 
            inset: 0; 
            background: linear-gradient(to bottom, var(--primary-color) 0%, #ffffff 100%); 
            z-index: 9999; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            flex-direction: column; 
            padding: 20px;
        }
        
        #name-input { 
            padding: 15px; width: 100%; max-width: 320px; font-size: 18px; 
            border: 2px solid var(--primary-color); border-radius: 10px; margin-bottom: 20px; text-align: center;
        }

        header { 
            background-color: var(--primary-color); 
            color: white; 
            padding: 12px 25px; 
            display: none; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 10; 
        }

        .main-container { 
            display: none; 
            flex: 1; 
            overflow: hidden; 
        }
        
        .sidebar { 
            width: 260px; 
            background-color: var(--bg-sidebar); 
            border-left: 1px solid #d1d9e0; 
            padding: 20px 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            overflow-y: auto; 
        }
        
        .timer-section { 
            background: var(--white); 
            border: 2px solid var(--primary-color); 
            border-radius: 10px; 
            padding: 15px; 
            text-align: center; 
        }
        .timer-value { font-size: 28px; font-weight: bold; color: #e74c3c; font-family: monospace; }

        .questions-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .q-num { 
            height: 35px; 
            background: white; 
            border: 1px solid #ccd6dd; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 5px;
            font-size: 12px;
        }
        .q-num.active { border: 2px solid #f39c12; background: #fffdf0; color: #f39c12; }
        .q-num.answered { background-color: var(--correct-green); color: white; border: none; }
        
        .content { flex: 1; padding: 20px; background: rgba(255, 255, 255, 0.85); overflow-y: auto; }
        .question-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 800px;
            margin: 0 auto;
        }

        .option { 
            padding: 12px 18px; 
            border: 1px solid #dee2e6; 
            border-radius: 10px; 
            cursor: pointer; 
            margin-bottom: 10px; 
            display: flex; 
            align-items: center; 
        }
        .option.selected { border: 2px solid var(--primary-color); background-color: #f0fafa; }

        .btn { padding: 12px 30px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-save { background-color: var(--primary-color); color: white; }

        footer { 
            background-color: var(--primary-color); 
            color: white; 
            text-align: center; 
            padding: 12px; 
            display: none; 
        }
    </style>
</head>
<body>

<div id="name-screen">
    <img src="https://i.ibb.co/qYjkGjbD/6cc50c2f-b3ae-4567-9938-c6babc3abd37.jpg" alt="Logo" style="width: 130px; margin-bottom: 20px; border-radius: 15px;">
    <h2>محاكي اختبار نمر</h2>
    <input type="text" id="name-input" placeholder="اكتب اسمك الثلاثي...">
    <button class="btn btn-save" style="width: 320px;" onclick="startQuiz()">ابدأ الاختبار</button>
</div>

<header id="main-header">
    <div id="top-answered">المجابة: 0 / 30</div>
    <div style="font-weight: bold;">محاكي اختبار نمر</div>
    <div id="user-display"></div>
</header>

<div class="main-container" id="app-body">
    <div class="content" id="main-content">
        <div class="question-card">
            <div id="section-title" style="color: var(--primary-color); font-weight: bold; margin-bottom: 8px;"></div>
            <div id="q-text" style="font-weight: bold; margin-bottom: 20px; font-size: 18px;"></div>
            <div id="options-container"></div>
            <div style="display: flex; justify-content: space-between; margin-top: 25px;">
                <button class="btn" style="background: #eee;" onclick="prevQuestion()">السابق</button>
                <button class="btn btn-save" onclick="nextQuestion()">حفظ والتالي</button>
            </div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="timer-section">
            <div class="timer-value" id="timer-box">30:00</div>
        </div>
        <div class="questions-grid" id="q-grid"></div>
    </div>
</div>

<footer id="main-footer">صل على النبي ﷺ</footer>

<script>
    // تم التحديث بالمفاتيح الجديدة التي أرسلتها
    const SERVICE_ID = "service_alszjvq"; 
    const TEMPLATE_ID = "template_o4zc9ar"; 
    const PUBLIC_KEY = "SVD10ASuh3Lyln1HJ"; 
    
    emailjs.init(PUBLIC_KEY);

    const _0x_aK = [2,3,2,2,2,3,1,0,3,2,1,3,3,2,2,0,2,1,1,2,2,1,3,3,3,3,0,2,3,2];
    const questions = [
        { q: "تحمل لوحات السيارات في السعودية 3 حروف و3 ارقام، فكم عدد اللوحات التي تحمل 3 حروف متشابهة و3 ارقام متشابهة وارقامها ليس جميعها متطابقة؟", options: ["2520", "28000", "27720", "27360"] },
        { q: "يسال اب ابنه كل يوم سؤال، اذا كانت الاجابة صحيحة ياخذ ريالين واذا كانت الاجابة خاطئة ياخذ ريال، وفي نهاية الشهر جمع الابن 47 ريال، ما نسبة الاسئلة التي جاوبها الابن اجابة صحيحة تقريبا؟", options: ["37%", "41%", "43%", "57%"] },
        { q: "يسال أب ابنه كل يوم سؤال، اذا كانت الاجابة صحيحة ياخذ ريالين واذا كانت الاجابة خاطئة ياخذ ريال، وفي نهاية الشهر جمع الابن 43 ريال، ما نسبة الاسئلة التي جاوبها الابن اجابة صحيحة؟", options: ["37%", "41%", "43%", "45%"] },
        { q: "إذا كان س³ ل < 0 ، س ل² > 0 ، أي الآتي صحيح؟", options: ["س < 0 ، ل < 0", "س > 0 ، ل < 0", "س < 0 ، ل > 0", "س > 0 ، ل > 0"] },
        { q: "احمد يعمل يوميا اونلاين في منزله، ولكن بعد كل 4 ايام يعمل يوما حضوريا، بعد كم يوم يتكرر نفس اليوم الذي بدأ فيه الدوام الحضوري اول مرة؟", options: ["20", "30", "35", "48"] },
        { q: "أوجد الحد التالي: 112، 334، 556، 778، .....", options: ["99", "9000", "9009", "9910"] },
        { q: "20 معلم و 20 مهندس و 18 طبيب و 17 طالب صرفوا 13200 ريال. إذا كان: 5 معلمين صرفوا مثل 4 مهندسين، 12 مهندس مثل 9 أطباء، 6 أطباء مثل 8 طلاب. كم متوسط صرف كل مهندس؟", options: ["180", "175", "210", "240"] },
        { q: "(م، ن، ج، ل، ف) نقاط في المستوى الإحداثي، إذا كانت ل تقع شرق م وغرب ن، و ج تقع جنوب شرق ن، و م تقع جنوب شرق f، فأي الآتي يقع في أقصى الغرب؟", options: ["ف", "ج", "ن", "ل"] },
        { q: "تتابع مريم متوسط درجاتها. إذا اختبرت 3 اختبارات وحصلت على درجة في الاختبار التالي سيزيد متوسطها 1، وإذا حصلت على 1 في 3 اختبارات تالية سينخفض 1. ما متوسطها حالياً؟", options: ["4", "5", "6", "7"] },
        { q: "عدد مكون من خانتين س ص، إذا كان تقريب العدد إلى أقرب 10 يساوي 100، فأي الآتي صحيح؟", options: ["س + ص = 9", "س - ص = 0", "ص - س = 4", "ص - س = 0"] },
        { q: "نملة في حفرة عمقها 10 متر، كل يوم تصعد 4م وتنزلق 2م، بعد كم يوماً تخرج؟", options: ["8", "9", "10", "11"] },
        { q: "ما قيمة: (1 + 2 + 3 + ..... + 51) - (2 + 4 + 6 + ..... + 30)؟", options: ["1226", "1236", "1068", "1086"] },
        { q: "كم عدد يمكن تكوينه من الأرقام (1 ، 2 ، 3 ، 5) بدون تكرار؟", options: ["23", "32", "54", "64"] },
        { q: "رجل في قطار سرعته 50 كم/س لاحظ قطار بضائع عكس الاتجاه مر كاملاً في 9 ثواني، طول القطار 280 م، ما سرعة قطار البضائع؟", options: ["50", "52", "62", "112"] },
        { q: "المتقدمين للتطعيم 5400، أخذ التطعيم 20%. كم نسبة من يأخذ التطعيم ممن لم يأخذوا ليكون نصف عدد المتقدمين قد أخذ التطعيم؟", options: ["25%", "33%", "37.5%", "50%"] },
        { q: "التناظر اللفظي - مطر:نبات", options: ["عقل:علم", "جهل فشل", "مدرسة:اجتهاد", "شهادة:نجاح"] },
        { q: "التناظر اللفظي - عبارة:معنى", options: ["طهارة:صلاة", "سفرة:طاولة", "طاعة:ثواب"] },
        { q: "التناظر اللفظي - ورق : حلي", options: ["ماء : ارتواء", "قمح : خبز", "زهر : رحيق", "عسل : نحل"] },
        { q: "التعليم الإلكتروني عن طريق.....من الوسائل....في هذا العصر.", options: ["الحاسب-التقليدية", "الإنترنت-التقنية", "المذياع-الحديثة", "الإنترنت-التقليدية"] },
        { q: "إذا أمكنك توصيل فكرتك في.....لا تجعلها في......", options: ["جملة-حروف", "كتاب-صفحات", "كلمة-صفحة", "صفحة-كتاب"] },
        { q: "كل شيء ........ تنساه إلا ما ........ .", options: ["أدرسته - أتقنته", "قرأته - حفظته", "سمعته - فهمته", "تعلمته - أتقنته"] },
        { q: "الخطأ السياقي - لا يتحقق الوفاء الا بالغدر، وإذا كان الغدر موجوداً فإن ثقة الناس ببعضهم عجز.", options: ["الغدر", "ببعضهم", "الوفاء", "فالثقة"] },
        { q: "الخطأ السياقي - معلم نفسه ومؤدبها أحق بالإجلال من معلم ذاته ومؤدبها.", options: ["نفسه", "أحق", "بالإستحقاق", "ذاته"] },
        { q: "الخطأ السياقي - الحقيقة بنت البحث وتفضل في يد المناظرات.", options: ["الحقيقة", "البحث", "تفضل", "يد"] },
        { q: "المفردة الشاذة - حدد الكلمة المختلفة:", options: ["شعر", "قصيدة", "ديوان", "قصة"] },
        { q: "المفردة الشاذة - حدد الكلمة المختلفة:", options: ["محسن", "كريم", "شجاع", "سخي"] },
        { q: "المفردة الشاذة - حدد الكلمة المختلفة:", options: ["الذخيرة", "القنبلة", "البندقية", "الصاروخ"] },
        { q: "المقصود بـ ( التنزه في عقول الناس ) هو:", options: ["مرافقة البسطاء", "التحدث مع الناس", "قراءة ما يكتبونه"] },
        { q: "من خلال النص (توانيت في أوان التعلم...) سبب الأنفة هو:", options: ["التكبر", "العلم الغزير", "احتقار المسألة", "الحياء"] },
        { q: "(إني ميت وأنهم لميتون) تعتبر:", options: ["من الفأل", "امتثال", "اقتباس", "يأس"] }
    ];

    let currentIdx = 0;
    let userAnswers = new Array(30).fill(null);
    let userName = "";
    let timerInterval;

    function startQuiz() {
        const input = document.getElementById('name-input');
        if (input.value.trim().length < 3) { alert("أدخل اسمك الثلاثي"); return; }
        userName = input.value.trim();
        document.getElementById('name-screen').style.display = 'none';
        document.getElementById('main-header').style.display = 'flex';
        document.getElementById('app-body').style.display = 'flex';
        document.getElementById('main-footer').style.display = 'block';
        document.getElementById('user-display').innerText = userName;
        const endTime = Date.now() + (30 * 60 * 1000);
        renderQuestion();
        startTimer(endTime);
    }

    function startTimer(endTime) {
        timerInterval = setInterval(() => {
            const distance = endTime - Date.now();
            if (distance <= 0) { clearInterval(timerInterval); finishQuiz(); return; }
            let m = Math.floor(distance / 60000);
            let s = Math.floor((distance % 60000) / 1000);
            document.getElementById('timer-box').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        }, 1000);
    }

    function renderQuestion() {
        const q = questions[currentIdx];
        document.getElementById('section-title').innerText = currentIdx < 15 ? "القسم الكمي" : "القسم اللفظي";
        document.getElementById('q-text').innerText = `س${currentIdx + 1}: ${q.q}`;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        const prefixes = ["أ", "ب", "ج", "د"];
        q.options.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = `option ${userAnswers[currentIdx] === i ? 'selected' : ''}`;
            div.innerHTML = `<span style="background:var(--primary-color); color:white; width:22px; height:22px; display:inline-flex; align-items:center; justify-content:center; border-radius:50%; margin-left:10px; font-size:12px;">${prefixes[i]}</span> ${opt}`;
            div.onclick = () => { userAnswers[currentIdx] = i; renderQuestion(); updateStats(); };
            container.appendChild(div);
        });
        updateGrid();
    }

    function updateGrid() {
        const grid = document.getElementById('q-grid');
        grid.innerHTML = '';
        questions.forEach((_, i) => {
            const d = document.createElement('div');
            d.className = `q-num ${(userAnswers[i] !== null) ? 'answered' : ''} ${i === currentIdx ? 'active' : ''}`;
            d.innerText = i + 1;
            d.onclick = () => { currentIdx = i; renderQuestion(); };
            grid.appendChild(d);
        });
    }

    function updateStats() {
        const count = userAnswers.filter(a => a !== null).length;
        document.getElementById('top-answered').innerText = `المجابة: ${count} / 30`;
    }

    function nextQuestion() {
        if (currentIdx < 29) { currentIdx++; renderQuestion(); }
        else { if(confirm("هل تريد تسليم الاختبار؟")) finishQuiz(); }
    }

    function prevQuestion() { if (currentIdx > 0) { currentIdx--; renderQuestion(); } }

    function finishQuiz() {
        clearInterval(timerInterval);
        let correctCount = 0;
        let details = "";
        const prefixes = ["أ", "ب", "ج", "د"];

        questions.forEach((q, i) => {
            const isCorrect = userAnswers[i] === _0x_aK[i];
            if (isCorrect) correctCount++;
            details += `س${i+1}: (${prefixes[userAnswers[i]] || 'لم يحل'}) | ${isCorrect ? '✅' : '❌'}\n`;
        });

        const scorePercent = Math.round((correctCount / 30) * 100);

        document.getElementById('sidebar').style.display = 'none';
        document.getElementById('main-content').innerHTML = `
            <div class='question-card' style='text-align:center;'>
                <h2>تم التسليم!</h2>
                <p>الطالب: ${userName}</p>
                <div style='background:#f1f1f1; padding:20px; border-radius:10px;'>
                    <p>درجتك: ${correctCount} من 30</p>
                    <p style='font-size:1.5em; font-weight:bold; color:var(--primary-color);'>%${scorePercent}</p>
                </div>
                <p id="mail-status" style="margin-top:15px; color:orange; font-weight:bold;">جاري إرسال النتيجة للإدارة...</p>
            </div>`;

        // إرسال البيانات باستخدام المفاتيح الجديدة
        emailjs.send(SERVICE_ID, TEMPLATE_ID, {
            user_name: userName,
            user_score: scorePercent + "%",
            user_details: details
        }).then(
            function() {
                document.getElementById('mail-status').innerText = "تم إرسال النتيجة بنجاح ✅";
                document.getElementById('mail-status').style.color = "green";
            },
            function(error) {
                alert("فشل الإرسال: " + JSON.stringify(error));
                document.getElementById('mail-status').innerText = "فشل الإرسال ❌";
                document.getElementById('mail-status').style.color = "red";
            }
        );
    }
</script>
</body>
</html>
