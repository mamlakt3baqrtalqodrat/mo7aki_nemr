<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي اختبار نمر - النسخة المحدثة</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { 
            --primary-color: #00a5a5; 
            --bg-sidebar: #f0f4f8; 
            --white: #ffffff; 
            --text-dark: #333;
            --correct-green: #2ecc71;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f7f9fb; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            color: var(--text-dark);
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://i.ibb.co/qYjkGjbD/6cc50c2f-b3ae-4567-9938-c6babc3abd37.jpg');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 450px;
            opacity: 0.1;
            z-index: -1;
            pointer-events: none;
        }

        #name-screen { 
            position: fixed; 
            inset: 0; 
            background: linear-gradient(to bottom, var(--primary-color) 0%, #ffffff 100%); 
            z-index: 9999; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            flex-direction: column; 
            padding: 20px;
        }
        
        #name-input { 
            padding: 15px; width: 100%; max-width: 320px; font-size: 18px; 
            border: 2px solid var(--primary-color); border-radius: 10px; margin-bottom: 20px; text-align: center;
        }

        header { 
            background-color: var(--primary-color); 
            color: white; 
            padding: 12px 25px; 
            display: none; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 10; 
        }

        .main-container { 
            display: none; 
            flex: 1; 
            overflow: hidden; 
        }
        
        .sidebar { 
            width: 260px; 
            background-color: var(--bg-sidebar); 
            border-left: 1px solid #d1d9e0; 
            padding: 20px 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            overflow-y: auto; 
        }
        
        .timer-section { 
            background: var(--white); 
            border: 2px solid var(--primary-color); 
            border-radius: 10px; 
            padding: 15px; 
            text-align: center; 
        }
        .timer-value { font-size: 28px; font-weight: bold; color: #e74c3c; font-family: monospace; }

        .questions-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .q-num { 
            height: 35px; 
            background: white; 
            border: 1px solid #ccd6dd; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 5px;
            font-size: 12px;
        }
        .q-num.active { border: 2px solid #f39c12; background: #fffdf0; color: #f39c12; }
        .q-num.answered { background-color: var(--correct-green); color: white; border: none; }
        
        .content { flex: 1; padding: 20px; background: rgba(255, 255, 255, 0.85); overflow-y: auto; }
        .question-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 800px;
            margin: 0 auto;
        }

        .option { 
            padding: 12px 18px; 
            border: 1px solid #dee2e6; 
            border-radius: 10px; 
            cursor: pointer; 
            margin-bottom: 10px; 
            display: flex; 
            align-items: center; 
        }
        .option.selected { border: 2px solid var(--primary-color); background-color: #f0fafa; }

        .btn { padding: 12px 30px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-save { background-color: var(--primary-color); color: white; }

        footer { 
            background-color: var(--primary-color); 
            color: white; 
            text-align: center; 
            padding: 12px; 
            display: none; 
        }
    </style>
</head>
<body>

<div id="name-screen">
    <img src="https://i.ibb.co/qYjkGjbD/6cc50c2f-b3ae-4567-9938-c6babc3abd37.jpg" alt="Logo" style="width: 130px; margin-bottom: 20px; border-radius: 15px;">
    <h2>محاكي اختبار نمر</h2>
    <input type="text" id="name-input" placeholder="اكتب اسمك الثلاثي...">
    <button class="btn btn-save" style="width: 320px;" onclick="startQuiz()">ابدأ الاختبار</button>
</div>

<header id="main-header">
    <div id="top-answered">المجابة: 0 / 30</div>
    <div style="font-weight: bold;">محاكي اختبار نمر</div>
    <div id="user-display"></div>
</header>

<div class="main-container" id="app-body">
    <div class="content" id="main-content">
        <div class="question-card">
            <div id="section-title" style="color: var(--primary-color); font-weight: bold; margin-bottom: 8px;"></div>
            <div id="q-text" style="font-weight: bold; margin-bottom: 20px; font-size: 18px;"></div>
            <div id="options-container"></div>
            <div style="display: flex; justify-content: space-between; margin-top: 25px;">
                <button class="btn" style="background: #eee;" onclick="prevQuestion()">السابق</button>
                <button class="btn btn-save" onclick="nextQuestion()">حفظ والتالي</button>
            </div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="timer-section">
            <div class="timer-value" id="timer-box">30:00</div>
        </div>
        <div class="questions-grid" id="q-grid"></div>
    </div>
</div>

<footer id="main-footer">صل على النبي ﷺ</footer>

<script>
    const SERVICE_ID = "service_alszjvq"; 
    const TEMPLATE_ID = "template_h6f7c0s"; 
    const PUBLIC_KEY = "SVD10ASuh3Lyln1HJ"; 
    
    emailjs.init(PUBLIC_KEY);

    // تم تحديث الأسئلة بناءً على مدخلاتك الجديدة
    const questions = [
        // القسم الكمي
        { q: "سؤال 1 (كمي)", options: ["×", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 2 (كمي)", options: ["س²", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 3 (كمي)", options: ["3", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 4 (كمي)", options: ["5000", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 5 (كمي)", options: ["المعطيات غير كافية", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 6 (كمي)", options: ["المعطيات غير كافية", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 7 (كمي)", options: ["٨", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 8 (كمي)", options: ["٦", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 9 (كمي)", options: ["\\frac{23}{36}", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 10 (كمي)", options: ["٢", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 11 (كمي)", options: ["٥", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 12 (كمي)", options: ["خالد", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 13 (كمي)", options: ["٦", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 14 (كمي)", options: ["١٥٠كلم", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 15 (كمي)", options: ["٢٣٥٠", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        
        // القسم اللفظي
        { q: "سؤال 1 (لفظي)", options: ["مصافحة: سلام", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 2 (لفظي)", options: ["توكل :تردد", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 3 (لفظي)", options: ["مكتبه : قراءه", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 4 (لفظي)", options: ["بالعدل-بالتواضع", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 5 (لفظي)", options: ["المعده-الدواء", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 6 (لفظي)", options: ["خفه-قوه", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 7 (لفظي)", options: ["اختفاء", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 8 (لفظي)", options: ["ارقد", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 9 (لفظي)", options: ["مشتبهة", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 10 (لفظي)", options: ["وجود بدائل صناعية أخرى ومع ذلك هم لا يستخدمونها", "كثرة وتعدد وسائل الترفيه في المملكة", "وجود بدائل كثيرة للحطب توفرها الدولة", "خيار آخر"] },
        { q: "سؤال 11 (لفظي)", options: ["ترشيد استهلاك الحطب", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 12 (لفظي)", options: ["وضع قوانين للحد من قطع الأشجار", "حل مشكلة حد الحطب", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 13 (لفظي)", options: ["مطالعه", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 14 (لفظي)", options: ["مناوله", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] },
        { q: "سؤال 15 (لفظي)", options: ["مصباح", "خيارات أخرى...", "خيارات أخرى...", "خيارات أخرى..."] }
    ];

    let currentIdx = 0;
    let userAnswers = new Array(30).fill(null);
    let userName = "";
    let timerInterval;

    function startQuiz() {
        const input = document.getElementById('name-input');
        if (input.value.trim().length < 3) { alert("أدخل اسمك الثلاثي"); return; }
        userName = input.value.trim();
        document.getElementById('name-screen').style.display = 'none';
        document.getElementById('main-header').style.display = 'flex';
        document.getElementById('app-body').style.display = 'flex';
        document.getElementById('main-footer').style.display = 'block';
        document.getElementById('user-display').innerText = userName;
        const endTime = Date.now() + (30 * 60 * 1000);
        renderQuestion();
        startTimer(endTime);
    }

    function startTimer(endTime) {
        timerInterval = setInterval(() => {
            const distance = endTime - Date.now();
            if (distance <= 0) { clearInterval(timerInterval); finishQuiz(); return; }
            let m = Math.floor(distance / 60000);
            let s = Math.floor((distance % 60000) / 1000);
            document.getElementById('timer-box').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        }, 1000);
    }

    function renderQuestion() {
        const q = questions[currentIdx];
        document.getElementById('section-title').innerText = currentIdx < 15 ? "القسم الكمي" : "القسم اللفظي";
        document.getElementById('q-text').innerText = `س${currentIdx + 1}: ${q.q}`;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        const prefixes = ["أ", "ب", "ج", "د"];
        q.options.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = `option ${userAnswers[currentIdx] === i ? 'selected' : ''}`;
            div.innerHTML = `<span style="background:var(--primary-color); color:white; width:22px; height:22px; display:inline-flex; align-items:center; justify-content:center; border-radius:50%; margin-left:10px; font-size:12px;">${prefixes[i]}</span> ${opt}`;
            div.onclick = () => { userAnswers[currentIdx] = i; renderQuestion(); updateStats(); };
            container.appendChild(div);
        });
        updateGrid();
    }

    function updateGrid() {
        const grid = document.getElementById('q-grid');
        grid.innerHTML = '';
        questions.forEach((_, i) => {
            const d = document.createElement('div');
            d.className = `q-num ${(userAnswers[i] !== null) ? 'answered' : ''} ${i === currentIdx ? 'active' : ''}`;
            d.innerText = i + 1;
            d.onclick = () => { currentIdx = i; renderQuestion(); };
            grid.appendChild(d);
        });
    }

    function updateStats() {
        const count = userAnswers.filter(a => a !== null).length;
        document.getElementById('top-answered').innerText = `المجابة: ${count} / 30`;
    }

    function nextQuestion() {
        if (currentIdx < 29) { currentIdx++; renderQuestion(); }
        else { if(confirm("هل تريد تسليم الاختبار؟")) finishQuiz(); }
    }

    function prevQuestion() { if (currentIdx > 0) { currentIdx--; renderQuestion(); } }

    function finishQuiz() {
        clearInterval(timerInterval);
        let details = "";
        const prefixes = ["أ", "ب", "ج", "د"];

        questions.forEach((q, i) => {
            details += `س${i+1}: (${prefixes[userAnswers[i]] || 'لم يحل'})\n`;
        });

        document.getElementById('sidebar').style.display = 'none';
        document.getElementById('main-content').innerHTML = `
            <div class='question-card' style='text-align:center;'>
                <h2>تم التسليم!</h2>
                <p>الطالب: ${userName}</p>
                <p id="mail-status" style="margin-top:15px; color:orange; font-weight:bold;">جاري إرسال الإجابات للإدارة...</p>
            </div>`;

        emailjs.send(SERVICE_ID, TEMPLATE_ID, {
            user_name: userName,
            user_details: details
        }).then(
            function() {
                document.getElementById('mail-status').innerText = "تم إرسال الإجابات بنجاح ✅";
                document.getElementById('mail-status').style.color = "green";
            },
            function(error) {
                alert("فشل الإرسال: " + JSON.stringify(error));
                document.getElementById('mail-status').innerText = "فشل الإرسال ❌";
                document.getElementById('mail-status').style.color = "red";
            }
        );
    }
</script>
</body>
</html>
